services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: shikigami:latest
    container_name: shikigami
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./data:/data
      - ${DOWNLOADS_DIR:-/ssd/downloads}:/downloads
      - ${LIBRARY_DIR:-/ssd/media}:/media
    stop_grace_period: 35s
