name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支重复 push 时取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install
        run: pnpm install --frozen-lockfile

      # turbo 编排: typecheck/test 自动先跑 generate(prisma client)。
      # 需要的 env 一次性注入,由 turbo globalEnv 声明参与缓存。
      - name: Lint & format check
        run: pnpm check

      - name: Typecheck & Test (turbo)
        env:
          DATABASE_URL: file:/tmp/ci.db
          JWT_SECRET: ci-jwt-secret-32bytes-long-padding
          ENCRYPTION_KEY: ci-encryption-key-32bytes-long-padding
          LLM_BASE_URL: https://api.openai.com/v1
          QBT_BASE_URL: http://localhost:8080
          ADMIN_PASSWORD: ci-test
        run: pnpm exec turbo run typecheck test

      - name: Build (turbo)
        env:
          DATABASE_URL: file:/tmp/ci.db
        run: pnpm exec turbo run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7
